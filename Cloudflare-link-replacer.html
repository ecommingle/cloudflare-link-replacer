<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloudflare Link Replacer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 600px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
    }

    .copy-btn {
      margin-top: 10px;
      background: #38bdf8;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Cloudflare Link Replacer</h2>

  <input id="linkInput" placeholder="Paste new Cloudflare link here..." />

  <button onclick="generateCommand()">Generate Command</button>

  <textarea id="output" placeholder="Your command will appear here..."></textarea>

  <button class="copy-btn" onclick="copyText()">Copy to Clipboard</button>
</div>

<script>
  function generateCommand() {
    const link = document.getElementById("linkInput").value.trim();

    if (!link) {
      alert("Please enter a link!");
      return;
    }

    const command = docker stop n8n && docker rm n8n && docker run -d --name n8n -p 5678:5678 -e N8N_HOST=${link} -e N8N_PROTOCOL=https -e WEBHOOK_URL=https://${link} -e N8N_EDITOR_BASE_URL=https://${link} -e GENERIC_TIMEZONE=Asia/Kolkata -v n8n_data:/home/node/.n8n --restart unless-stopped docker.n8n.io/n8nio/n8n;

    document.getElementById("output").value = command;
  }

  function copyText() {
    const output = document.getElementById("output");
    output.select();
    document.execCommand("copy");
    alert("Copied!");
  }
</script>

</body>
</html>
