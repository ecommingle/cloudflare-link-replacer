<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cloudflare Link Tool</title>
</head>

<body style="font-family: Arial; padding:20px; background:#111; color:white;">

<h2>Cloudflare Link Replacer</h2>

<input id="linkInput" placeholder="Paste link here"
style="width:100%; padding:10px; margin-bottom:10px;" />

<button id="generateBtn">Generate Command</button>

<br><br>

<textarea id="output" style="width:100%; height:120px;"></textarea>

<br><br>

<button id="copyBtn">Copy</button>

<script>
  document.getElementById("generateBtn").addEventListener("click", function () {

    let link = document.getElementById("linkInput").value;

    if (!link) {
      alert("Enter link first");
      return;
    }

    // Clean link
    link = link.replace("https://", "").replace("http://", "").trim();

    let command = "docker stop n8n && docker rm n8n && docker run -d --name n8n -p 5678:5678 -e N8N_HOST=" + link +
    " -e N8N_PROTOCOL=https -e WEBHOOK_URL=https://" + link +
    " -e N8N_EDITOR_BASE_URL=https://" + link +
    " -e GENERIC_TIMEZONE=Asia/Kolkata -v n8n_data:/home/node/.n8n --restart unless-stopped docker.n8n.io/n8nio/n8n";

    document.getElementById("output").value = command;
  });

  document.getElementById("copyBtn").addEventListener("click", function () {
    let text = document.getElementById("output").value;

    if (!text) {
      alert("Nothing to copy");
      return;
    }

    navigator.clipboard.writeText(text);
    alert("Copied!");
  });
</script>

</body>
</html>
